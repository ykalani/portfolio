<!DOCTYPE html>
<html lang="en">
<head>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #111;
      --ink-muted: #555;
      --surface: #fff;
      --surface-dim: #f5f5f5;
      --border: #e0e0e0;
      --accent: #0a3b73;
      --accent-hover: #1d5ea8;
      --radius: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #e8e8e8;
        --ink-muted: #999;
        --surface: #111;
        --surface-dim: #1a1a1a;
        --border: #2a2a2a;
        --accent: #5b9bd5;
        --accent-hover: #7db8e8;
      }
    }

    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: var(--surface);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1.5rem;
      border: 3px solid var(--border);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-wrap: balance;
      margin-bottom: 0.35rem;
    }

    .role {
      color: var(--ink-muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
      text-wrap: pretty;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.7rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 500;
      background: var(--surface);
      transition: border-color 0.15s, background 0.15s;
    }

    .link:hover {
      border-color: var(--accent);
      background: var(--surface-dim);
    }

    .link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .link .icon {
      width: 18px;
      height: 18px;
      opacity: 0.6;
    }

    .footer {
      margin-top: 2.5rem;
      display: flex;
      justify-content: center;
      gap: 1.25rem;
    }

    .footer a {
      color: var(--ink-muted);
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.15s;
    }

    .footer a:hover { color: var(--accent); }
    .footer a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
