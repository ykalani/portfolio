<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a3b73" />
  <title>Yash — Directory</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #111;
      --ink-muted: #555;
      --surface: #fff;
      --surface-dim: #f5f5f5;
      --border: #e0e0e0;
      --accent: #0a3b73;
      --accent-hover: #1d5ea8;
      --radius: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #e8e8e8;
        --ink-muted: #999;
        --surface: #111;
        --surface-dim: #1a1a1a;
        --border: #2a2a2a;
        --accent: #5b9bd5;
        --accent-hover: #7db8e8;
      }
    }

    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--surface);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-wrap: balance;
      margin-bottom: 0.35rem;
      color: var(--accent);
    }

    .subtitle {
      color: var(--ink-muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
      font-style: italic;
      text-wrap: pretty;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.85rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--ink);
      text-align: left;
      background: var(--surface);
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }

    .link:hover {
      border-color: var(--accent);
      background: var(--surface-dim);
      transform: translateY(-1px);
    }

    .link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .link .glyph {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--surface-dim);
      color: var(--accent);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .link .text {
      flex: 1;
      min-width: 0;
    }

    .link .title {
      font-size: 0.95rem;
      font-weight: 600;
      display: block;
    }

    .link .desc {
      font-size: 0.8rem;
      color: var(--ink-muted);
      margin-top: 0.1rem;
      text-wrap: pretty;
    }

    .link .arrow {
      color: var(--ink-muted);
      font-size: 1rem;
      opacity: 0.5;
    }

    .footer {
      margin-top: 2.5rem;
      display: flex;
      justify-content: center;
      gap: 1.25rem;
    }

    .footer a {
      color: var(--ink-muted);
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.15s;
    }

    .footer a:hover { color: var(--accent); }
    .footer a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; transform: none !important; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Yash Kalani</h1>
    <p class="subtitle">Site directory</p>

    <nav class="links" aria-label="Site directory">
      <a class="link" href="/">
        <span class="glyph" aria-hidden="true">H</span>
        <span class="text">
          <span class="title">Home</span>
          <span class="desc">Landing page with social links</span>
        </span>
        <span class="arrow" aria-hidden="true">&rarr;</span>
      </a>
      <a class="link" href="/profiles">
        <span class="glyph" aria-hidden="true">P</span>
        <span class="text">
          <span class="title">Profiles</span>
          <span class="desc">All my social profiles in one place</span>
        </span>
        <span class="arrow" aria-hidden="true">&rarr;</span>
      </a>
      <a class="link" href="/yashOS">
        <span class="glyph" aria-hidden="true">Y</span>
        <span class="text">
          <span class="title">yashOS</span>
          <span class="desc">Retro Windows-style desktop portfolio shell</span>
        </span>
        <span class="arrow" aria-hidden="true">&rarr;</span>
      </a>
      <a class="link" href="/flashcards">
        <span class="glyph" aria-hidden="true">F</span>
        <span class="text">
          <span class="title">Flashcard Review</span>
          <span class="desc">SM-2 spaced repetition with AI card generation</span>
        </span>
        <span class="arrow" aria-hidden="true">&rarr;</span>
      </a>
    </nav>

    <footer class="footer">
      <a href="/">&larr; Back home</a>
    </footer>
  </main>
</body>
</html>
